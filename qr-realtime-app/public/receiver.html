<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đặt Câu Hỏi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#2563eb; --success:#10b981; --danger:#ef4444; --bg:#f8fafc; --card:#fff; --text:#1f2937; --border:#cbd5e1; --radius:12px; }
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .app{width:100%;max-width:520px;background:var(--card);border-radius:var(--radius);box-shadow:0 10px 25px rgba(15,23,42,.08);padding:1.35rem;border:1px solid #e2e8f0;}
    h1{margin:0;font-size:1.45rem;color:#0f172a;}
    .subtitle{color:#475569;font-size:.93rem;margin-top:.25rem;}
    .group{margin-top:1rem;display:flex;flex-direction:column;gap:.35rem;}
    label{font-size:.9rem;color:#1f2937;}
    input,textarea{width:100%;padding:.7rem .8rem;border:1px solid var(--border);border-radius:8px;background:#fff;}
    textarea{min-height:100px;resize:vertical;}
    .inline{display:flex;gap:.5rem;align-items:flex-end;}
    button{border:0;background:var(--primary);color:#fff;padding:.7rem 1rem;border-radius:8px;font-weight:600;cursor:pointer;}
    button:disabled{background:#9ca3af;cursor:not-allowed;}
    .badge{display:inline-block;background:#eff6ff;color:#1d4ed8;padding:.25rem .7rem;border-radius:999px;font-weight:600;font-size:.85rem;}
    .message{margin-top:.9rem;padding:.75rem .8rem;border-radius:8px;display:none;font-size:.9rem;}
    .message.success{background:#ecfdf3;color:#065f46;border:1px solid #bbf7d0;display:block;}
    .message.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block;}
  </style>
</head>
<body>
  <div class="app">
    <h1>Đặt câu hỏi</h1>
    <p class="subtitle">Nhập ID phiên hoặc mở link có id để gửi câu hỏi.</p>

    <div class="group">
      <label for="sessionInput">ID phiên (6 số)</label>
      <div class="inline">
        <input id="sessionInput" maxlength="6" placeholder="123456" />
        <button id="setSessionBtn" type="button">Xác nhận</button>
      </div>
      <div id="sessionBadge" class="badge">Chưa có phiên.</div>
    </div>

    <form id="askForm">
      <div class="group">
        <label for="name">Tên của bạn</label>
        <input id="name" type="text" maxlength="50" placeholder="Nguyễn Văn A" required />
      </div>
      <div class="group">
        <label for="question">Câu hỏi</label>
        <textarea id="question" maxlength="250" placeholder="Nhập câu hỏi..."></textarea>
      </div>
      <button id="submitBtn" type="submit" disabled>Gửi câu hỏi</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="receiver.js"></script>
</body>
</html>
